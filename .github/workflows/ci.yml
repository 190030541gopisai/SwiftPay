name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and install shared module
        working-directory: common
        run: ./mvnw -B clean install

      - name: Build and test ledger
        working-directory: ledger
        run: ./mvnw -B clean package -DrunIntegrationTests=true

      - name: Build and test payment gateway
        working-directory: payment.gateway
        run: ./mvnw -B clean package -DrunIntegrationTests=true

      - name: Build ledger Docker image
        run: docker build -t swiftpay-ledger:${{ github.sha }} -f ledger/Dockerfile .

      - name: Build payment gateway Docker image
        run: docker build -t swiftpay-payment-gateway:${{ github.sha }} -f payment.gateway/Dockerfile .
