name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DB_PASSWORD: root
    services:
      ledger_db:
        image: postgres:16
        env:
          POSTGRES_DB: ledger
          POSTGRES_USER: user
          POSTGRES_PASSWORD: root
        ports:
          - 5401:5432
        options: >-
          --health-cmd="pg_isready -U user -d ledger"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      payment_gateway_db:
        image: postgres:16
        env:
          POSTGRES_DB: payment_gateway
          POSTGRES_USER: user
          POSTGRES_PASSWORD: root
        ports:
          - 5400:5432
        options: >-
          --health-cmd="pg_isready -U user -d payment_gateway"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      kafka:
        image: apache/kafka:latest
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:29092,EXTERNAL://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_NUM_PARTITIONS: 3
        ports:
          - 9092:9092

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Wait for dependent services
        run: |
          for port in 5400 5401 6379 9092; do
            echo "Waiting for localhost:${port}..."
            for i in {1..60}; do
              if (echo > /dev/tcp/127.0.0.1/${port}) >/dev/null 2>&1; then
                echo "Port ${port} is reachable"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "Timed out waiting for port ${port}"
                exit 1
              fi
              sleep 2
            done
          done

      - name: Build and install shared module
        working-directory: common
        run: ./mvnw -B clean install

      - name: Build and test ledger
        working-directory: ledger
        run: ./mvnw -B clean package -DrunIntegrationTests=true

      - name: Build and test payment gateway
        working-directory: payment.gateway
        run: ./mvnw -B clean package -DrunIntegrationTests=true

      - name: Build ledger Docker image
        run: docker build -t swiftpay-ledger:${{ github.sha }} -f ledger/Dockerfile .

      - name: Build payment gateway Docker image
        run: docker build -t swiftpay-payment-gateway:${{ github.sha }} -f payment.gateway/Dockerfile .
